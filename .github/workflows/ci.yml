name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # App + dev extras cover everything the no-network suite needs
      # (sklearn/xgboost for the model tests). torch is deliberately excluded —
      # it's heavy, so the Phase 2.5 sequence-model test self-skips when torch is
      # absent; the full LSTM experiment is reproduced locally via analysis/.
      - name: Install
        run: pip install -e ".[app,dev]" scikit-learn xgboost

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests (no-network suite)
        run: pytest -q

  # The React app must typecheck and produce a production build — a TS error
  # or broken import would otherwise merge green (pytest never sees frontend/).
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck + build (tsc && vite build)
        run: npm run build
