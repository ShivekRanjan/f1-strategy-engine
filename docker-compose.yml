# Full stack locally over one command:
#   docker compose up
# API -> http://localhost:8000/docs   (FastAPI)
# UI  -> http://localhost:5173         (React frontend, talks to the API above)
services:
  api:
    build: .
    image: f1se-api
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - api
    environment:
      # The browser calls the API on the host, so localhost:8000 is correct.
      VITE_API_BASE: "http://localhost:8000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
